html, body { height: 100%; }

body {
  background-color: #0A0A0A;
  color: #F5F5F5;
  font-family: 'DM Mono', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
}

.container {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
}

.header {
  border: 2px solid #F5F5F5;
  border-bottom: none;
  padding: 28px 24px 22px;
  background: #0A0A0A;
}

.label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: #E8180C;
  text-transform: uppercase;
  margin-bottom: 10px;
}

h1 {
  font-family: 'Anton', sans-serif;
  font-size: 52px;
  line-height: 0.92;
  letter-spacing: 0.01em;
  text-transform: uppercase;
  color: #F5F5F5;
}

.selects {
  display: block;
  font-family: 'Anton', sans-serif;
  font-size: 24px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #F5F5F5;
  margin-top: 10px;
}

.links {
  border: 2px solid #F5F5F5;
  border-top: none;
  display: flex;
  flex-direction: column;
}

.link-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  text-decoration: none;
  color: #F5F5F5;
  border-bottom: 1px solid rgba(245,245,245,0.1);
  position: relative;
  overflow: hidden;
}

.link-item:last-child {
  border-bottom: none;
}

.link-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 0;
  background: #E8180C;
  transition: width 0.2s ease;
  z-index: 0;
}

.link-item:hover::before {
  width: 100%;
}

.link-left {
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  z-index: 1;
}

.link-platform {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,245,245,0.75);
  min-width: 72px;
}

.link-name {
  font-family: 'Anton', sans-serif;
  font-size: 18px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: #F5F5F5;
}

.link-arrow {
  position: relative;
  z-index: 1;
  font-size: 18px;
  color: #F5F5F5;
  opacity: 0.6;
}

.footer {
  border: 2px solid #F5F5F5;
  border-top: none;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-text {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: rgba(245,245,245,0.4);
  text-transform: uppercase;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #E8180C;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
