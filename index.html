```
:root {
  --red: #E8180C;
  --black: #0A0A0A;
  --white: #F5F5F5;
  --border: 2px solid var(--white);
}

html, body {
  height: 100%;
}

body {
  background-color: var(--black);
  color: var(--white);
  font-family: 'DM Mono', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  position: relative;
  overflow-x: hidden;
}

/* Background noise texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 0;
}

/* Header */
.header {
  border: var(--border);
  border-bottom: none;
  padding: 28px 24px 22px;
  position: relative;
  background: var(--black);
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 24px;
  right: 24px;
  height: 1px;
  background: var(--red);
}

.label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--red);
  text-transform: uppercase;
  margin-bottom: 10px;
}

h1 {
  font-family: 'Anton', sans-serif;
  font-size: clamp(38px, 10vw, 56px);
  line-height: 0.92;
  letter-spacing: 0.01em;
  text-transform: uppercase;
  color: var(--white);
}

.selects {
  display: block;
  font-family: 'Anton', sans-serif;
  font-size: clamp(18px, 4.5vw, 26px);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--white);
  margin-top: 8px;
}

/* Links block */
.links {
  border: var(--border);
  border-top: none;
  display: flex;
  flex-direction: column;
}

.link-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  text-decoration: none;
  color: var(--white);
  border-bottom: 1px solid rgba(245,245,245,0.1);
  position: relative;
  overflow: hidden;
  transition: color 0.15s ease;
  cursor: pointer;
}

.link-item:last-child {
  border-bottom: none;
}

.link-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 0;
  background: var(--red);
  transition: width 0.2s cubic-bezier(0.4,0,0.2,1);
  z-index: 0;
}

.link-item:hover::before {
  width: 100%;
}

.link-item:hover {
  color: var(--white);
}

.link-left {
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  z-index: 1;
}

.link-platform {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,245,245,0.4);
  transition: color 0.15s ease;
  min-width: 72px;
}

.link-item:hover .link-platform {
  color: rgba(255,255,255,0.7);
}

.link-name {
  font-family: 'Anton', sans-serif;
  font-size: 18px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.link-arrow {
  position: relative;
  z-index: 1;
  font-size: 18px;
  opacity: 0.4;
  transition: opacity 0.15s ease, transform 0.15s ease;
}

.link-item:hover .link-arrow {
  opacity: 1;
  transform: translate(3px, -3px);
}

/* Footer */
.footer {
  border: var(--border);
  border-top: none;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-text {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: rgba(245,245,245,0.25);
  text-transform: uppercase;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* Entry animation */
.container > * {
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.5s ease forwards;
}
.container > *:nth-child(1) { animation-delay: 0.05s; }
.container > *:nth-child(2) { animation-delay: 0.15s; }
.container > *:nth-child(3) { animation-delay: 0.25s; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
```
